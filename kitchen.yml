---
provisioner:
  multiple_converge: 2
  chef_license: accept
  client_rb:
    environment: _default
    log_level: :debug

verifier: inspec

platforms:
  - name: almalinux-9
  - name: almalinux-10
  - name: amazonlinux-2023
  - name: debian-12
  - name: debian-13
  - name: rocky-9
  - name: rocky-10
  - name: ubuntu-2204
  - name: ubuntu-2404
  - name: opensuse-leap-15
  - name: opensuse-leap-16

suites:
  - name: default
    run_list:
      - recipe[test::default]

  - name: client
    run_list:
      - recipe[test::client]

  - name: server-runas-root
    lifecycle:
      post_converge:
        - local: sleep 120
    run_list:
      - recipe[test::server_runas_root]

  - name: server-runas-splunk
    lifecycle:
      post_converge:
        - local: sleep 120
    run_list:
      - recipe[test::server]

  - name: server-shdeployer
    run_list:
      - recipe[test::server_shdeployer]

  - name: disabled
    run_list:
      - recipe[test::disabled]

  - name: upgrade-server
    run_list:
      - recipe[test::upgrade_server]

  - name: upgrade-client
    run_list:
      - recipe[test::upgrade_client]

  - name: server-resources
    run_list:
      - recipe[test::server_resources]

  - name: client-resources
    run_list:
      - recipe[test::client_resources]

  - name: uninstall-client
    run_list:
      - recipe[test::uninstall_client]
